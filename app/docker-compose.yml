services:
  nginx_test_ayan:
    image: nginx:1.27-alpine
    container_name: nginx_test_ayan
    ports:
      - '8090:80'
    volumes:
      - ./:/var/www/html
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - php_test_ayan

  php_test_ayan:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: php_test_ayan
    working_dir: /var/www/html
    volumes:
      - ./:/var/www/html
    environment:
      DB_HOST: mysql_test_ayan
      DB_PORT: 3306
      DB_NAME: qr_shortener
      DB_USER: qr_user
      DB_PASSWORD: qr_password
    depends_on:
      mysql_test_ayan:
        condition: service_healthy

  mysql_test_ayan:
    image: mysql:8.4
    container_name: mysql_test_ayan
    restart: unless-stopped
    environment:
      MYSQL_DATABASE: qr_shortener
      MYSQL_USER: qr_user
      MYSQL_PASSWORD: qr_password
      MYSQL_ROOT_PASSWORD: root
    ports:
      - '3390:3306'
    volumes:
      - mysql_test_ayan_data:/var/lib/mysql
    healthcheck:
      test: ['CMD', 'mysqladmin', 'ping', '-h', 'localhost', '-uroot', '-proot']
      interval: 5s
      timeout: 5s
      retries: 20

volumes:
  mysql_test_ayan_data:
